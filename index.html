<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENTRO - INTERNAL</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00e5ff;
            --card: #16161a;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 50px 0;
            text-align: center;
            background: linear-gradient(180deg, rgba(0,229,255,0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--accent);
        }
        h1 {
            color: var(--accent);
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--accent);
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <h1>ZENTRO</h1>
    </header>
    <div class="container">
        <div class="card">
            <div class="status">SISTEM AKTIF</div>
            <p style="margin-top: 20px; opacity: 0.8;">Selamat datang di halaman internal. Gunakan informasi ini hanya untuk keperluan grup mabar.</p>
        </div>
    </div>
    <footer style="margin-top: auto; padding: 20px; opacity: 0.4; font-size: 0.7rem;">
        &copy; 2026 ZENTRO PROJECT
    </footer>
</body>
</html>
